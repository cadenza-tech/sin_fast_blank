name: Release
on:
  push:
    tags:
      - 'v*'
permissions:
  contents: read
  id-token: write
jobs:
  release-java:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: jruby-9.3
          bundler-cache: true
      - name: Release to RubyGems
        uses: rubygems/release-gem@v1
        continue-on-error: true
  release-ruby:
    runs-on: ubuntu-latest
    needs: release-java
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: 3
          bundler-cache: true
      - name: Release to RubyGems
        uses: rubygems/release-gem@v1
